<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… — Skye Wealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Corben:wght@400;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/chat.css">
<style>
  .post-hero{
    padding:140px 48px 64px;
    background:var(--cream);
    color:var(--black);
    max-width:800px;
    margin:0 auto;
  }
  .post-cats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .post-cat{
    font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--coral);
  }
  .post-title{
    font-family:'Corben',serif;font-weight:400;
    font-size:clamp(36px,6vw,72px);line-height:1.05;letter-spacing:-0.02em;
    color:var(--black);margin-bottom:24px;
  }
  .post-meta{
    display:flex;align-items:center;gap:16px;
    font-size:14px;color:#999;padding-bottom:32px;
    border-bottom:1px solid rgba(0,0,0,.08);
  }
  .post-author-img{
    width:40px;height:40px;border-radius:50%;object-fit:cover;
    background:var(--coral);display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;flex-shrink:0;
  }
  .post-author-name{font-weight:600;color:var(--black)}

  .post-cover{
    width:100%;max-width:900px;margin:0 auto 0;
    display:block;
  }
  .post-cover img{
    width:100%;height:clamp(280px,40vw,520px);
    object-fit:cover;
  }

  .post-body{
    max-width:720px;margin:0 auto;
    padding:64px 48px 120px;
    color:var(--black);
    font-size:18px;line-height:1.8;
  }
  .post-body h2{
    font-family:'Corben',serif;font-weight:400;
    font-size:clamp(28px,4vw,42px);line-height:1.1;letter-spacing:-0.02em;
    margin:56px 0 20px;color:var(--black);
  }
  .post-body h3{
    font-family:'Corben',serif;font-weight:400;
    font-size:clamp(22px,3vw,30px);line-height:1.15;letter-spacing:-0.01em;
    margin:40px 0 16px;color:var(--black);
  }
  .post-body h4{
    font-size:18px;font-weight:700;margin:32px 0 12px;color:var(--black);
  }
  .post-body p{margin-bottom:24px;color:#333}
  .post-body strong{font-weight:700;color:var(--black)}
  .post-body em{font-style:italic}
  .post-body code{
    font-family:monospace;font-size:15px;
    background:var(--cream);padding:2px 7px;border-radius:4px;
  }
  .post-body a{color:var(--coral);text-decoration:underline;text-decoration-color:rgba(242,104,97,.35)}
  .post-body a:hover{text-decoration-color:var(--coral)}
  .post-body blockquote{
    border-left:3px solid var(--coral);
    margin:40px 0;padding:16px 28px;
    background:var(--cream);border-radius:0 12px 12px 0;
    font-size:20px;font-style:italic;color:#555;line-height:1.65;
  }
  .post-body figure{margin:40px 0}
  .post-body figure img{
    width:100%;border-radius:16px;
    box-shadow:0 12px 40px rgba(0,0,0,.1);
  }
  .post-body figcaption{
    text-align:center;font-size:13px;color:#aaa;margin-top:12px;
  }

  /* CTA block at end of post */
  .post-cta{
    max-width:720px;margin:0 auto;
    padding:0 48px 120px;
  }
  .post-cta-inner{
    background:var(--black);border-radius:24px;
    padding:52px 48px;
    display:flex;align-items:center;justify-content:space-between;
    gap:40px;
  }
  .post-cta-heading{
    font-family:'Corben',serif;font-weight:400;
    font-size:clamp(24px,3vw,36px);line-height:1.1;letter-spacing:-0.02em;
    color:#fff;margin-bottom:10px;
  }
  .post-cta-sub{font-size:15px;color:rgba(255,255,255,.45);line-height:1.5}
  .post-cta-btns{display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}

  /* Back link */
  .post-back{
    display:inline-flex;align-items:center;gap:8px;
    padding:140px 48px 0;max-width:800px;margin:0 auto;
    font-size:14px;font-weight:600;color:#aaa;
    text-decoration:none;transition:color .2s;
    display:block;
  }
  .post-back:hover{color:var(--coral)}

  .post-loading{
    display:flex;justify-content:center;align-items:center;
    min-height:60vh;gap:8px;
  }
  .loading-dot{
    width:10px;height:10px;border-radius:50%;background:var(--coral);
    animation:loadpulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2){animation-delay:.2s}
  .loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes loadpulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

  @media(max-width:900px){
    .post-hero,.post-body,.post-cta,.post-back{padding-left:24px;padding-right:24px}
    .post-cta-inner{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>

<nav class="nav is-glass" id="nav">

  <ul class="nav-links">

  </ul>

</nav>

<div id="post-root">
  <div class="post-loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<script src="js/post.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
